<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <!-- Title é um título exibido na barra do navegador -->
</head>

<body>
    <header><!-- Cabeçalho do site --></header>
    <nav><!-- Barra de navegação do site (fica dentro do header) --></nav>
    <div style="background-color: bisque;"><!-- Caixa principal -->
        <hr><!-- Coloca linha no site -->
        <strong></strong> <!-- Colocar as letras em negrito -->
        <em></em> <!-- Deixar em itálico -->

        <!-- ALT + SHIFT + F = formatação dos códigos -->
        <!-- ALT + SHIFT + A = incluir comentários -->
        <!-- ALT + Z = quebra de linhas -->
        <!-- WINDOWS + SHIFT + S = print da tela -->

        <h1>Sozinho</h1><!-- Título -->

        <div style="background-color: blueviolet;"><!-- Caixa segundária -->
            <section style="background-color: aquamarine;"><strong>Bem bem</strong></section>
            <!-- Tag semânticas!!!! -->
            <article style="background-color: brown;"><em>Bruschi</em></article>
        </div>

        <aside style="background-color: black;">OompaLoompa</aside>
    </div>

    <ol type="I" type="i" type="a" type="A" type="1" <li>Alunos</li>
        <li>Alunos</li>
    </ol> <!-- Lista ordenada -->
    



</body>

</html>
